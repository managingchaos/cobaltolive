
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cobalt Olive</title>
  <meta name="description" content="A minimalist creative identity focused on brand clarity, aesthetic restraint, and meaningful presence.">
  <meta name="theme-color" content="#e9feff">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preload" as="image" href="olive.webp" type="image/webp">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #e9feff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: sans-serif;
      text-align: center;
      opacity: 0;
      animation: fadeIn 1s ease-in-out forwards;
    }
    img.logo {
      width: 500px;
      height: 500px;
      max-width: 100%;
      height: auto;
      transition: transform 0.3s ease-in-out;
    }
    img.logo:hover {
      transform: scale(1.03);
    }
    a {
      color: #0047AB;
      margin-top: 20px;
      text-decoration: none;
      font-size: 1rem;
      opacity: 0;
      animation: fadeInText 1s ease-in-out forwards;
      animation-delay: 0.5s;
    }
    footer {
      position: absolute;
      bottom: 20px;
      font-size: 0.75rem;
      color: #999;
      text-align: center;
      line-height: 1.4;
    }
    .privacy {
      font-size: 0.65rem;
      font-style: italic;
      color: #ccc;
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }
    @keyframes fadeInText {
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <img src="olive.webp" alt="Cobalt Olive Logo" class="logo" width="500" height="500">
  <a href="mailto:hello@cobaltolive.com">hello@cobaltolive.com</a>
  <footer>
    &copy; 2025 Cobalt Olive. All rights reserved.<br>
    <span class="privacy">This site collects limited anonymous data for performance and traffic insights.</span>
  </footer>
  <img src="/logger-25" style="display: none;" alt="">
</body>
</html>
