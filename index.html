
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cobalt Olive</title>
  <meta name="description" content="A minimalist creative identity focused on brand clarity, aesthetic restraint, and meaningful presence.">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: sans-serif;
      text-align: center;
      opacity: 0;
      animation: fadeIn 1s ease-in-out forwards;
    }
    img {
      max-width: 300px;
      height: auto;
      transition: transform 0.3s ease-in-out;
    }
    img:hover {
      transform: scale(1.03);
    }
    a {
      color: #333;
      margin-top: 20px;
      text-decoration: none;
      font-size: 1rem;
      opacity: 0;
      animation: fadeInText 1s ease-in-out forwards;
      animation-delay: 0.5s;
    }
    footer {
      position: absolute;
      bottom: 20px;
      font-size: 0.75rem;
      color: #999;
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }
    @keyframes fadeInText {
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <img src="olive.png" alt="Cobalt Olive Logo">
  <a href="mailto:hello@cobaltolive.com">hello@cobaltolive.com</a>
  <footer>&copy; 2025 Cobalt Olive. All rights reserved.</footer>
</body>
</html>
