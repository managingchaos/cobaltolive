<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Thank You – Cobalt Olive</title>
  <meta name="description" content="Thank you for contacting Cobalt Olive. We'll be in touch shortly.">
  <meta name="theme-color" content="#d9d9d9">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="https://use.typekit.net/odl3tlj.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #d9d9d9;
      font-family: "acumin-pro-extra-condensed", sans-serif;
      color: #163359;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background: #d9d9d9;
    }

    .top-bar img {
      height: 50px;
    }

    nav {
      display: flex;
      gap: 1.5rem;
    }

    nav a {
      text-decoration: none;
      color: #586f8c;
      font-size: 1.5rem;
      font-weight: 300;
    }

    main {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 4rem 2rem;
    }

    h1 {
      font-size: 4rem;
      color: #586f8c;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1.5rem;
      font-weight: 300;
      max-width: 600px;
    }

    .button {
      margin-top: 2rem;
      background-color: #d9d9d9;
      border: 2px solid black;
      border-radius: 12px;
      padding: 0.75rem 1.5rem;
      text-decoration: none;
      color: black;
      font-size: 1.5rem;
      font-weight: 500;
      position: relative;
      transition: transform 0.1s ease-in-out;
    }

    .button::after {
      content: '';
      position: absolute;
      top: 6px;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #c7c7c7;
      border: 2px solid black;
      border-top: none;
      border-radius: 0 0 12px 12px;
      z-index: -1;
      transition: all 0.1s ease-in-out;
    }

    .button:hover {
      animation: wiggle 0.4s ease-in-out;
    }

    @keyframes wiggle {
      0%, 100% { transform: translateY(2px) rotate(0deg); }
      25% { transform: translateY(2px) rotate(1deg); }
      50% { transform: translateY(2px) rotate(-1deg); }
      75% { transform: translateY(2px) rotate(1deg); }
    }

    .button:active {
      transform: translateY(6px);
    }

    .button:active::after {
      opacity: 0;
    }

    footer {
      text-align: center;
      font-size: 1rem;
      color: #999;
      margin: 4rem 0 1rem;
    }

    .privacy {
      font-size: 1rem;
      font-style: italic;
      color: #999;
    }

    .privacy a {
      color: #999;
    }
  </style>
</head>
<body>

  <!-- Top Nav -->
  <div class="top-bar">
    <a href="/"><img src="cobalt_olive_full_logo.webp" alt="Cobalt Olive logo" loading="lazy"></a>
    <nav>
      <a href="/about.html">About</a>
      <a href="/services.html">Services</a>
      <a href="/contact.html">Contact</a>
      <a href="/privacy.html">Privacy</a>
    </nav>
  </div>

  <!-- Message -->
  <main>
    <h1>Thank You!</h1>
    <p>Your message has been received. We'll be in touch shortly.</p>
    <a href="/" class="button">Return to Homepage</a>
  </main>

  <!-- Footer -->
  <footer>
    &copy; 2025 Cobalt Olive. All rights reserved.<br>
    <span class="privacy">
      This site collects limited anonymous data for performance and traffic insights.
      <a href="/privacy.html">Privacy policy</a>.
      <a href="/contact.html">Contact</a>.
    </span>
  </footer>

</body>
</html>
