<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page Not Found – Cobalt Olive</title>
  <meta name="description" content="Sorry, we couldn't find that page.">
  <meta name="theme-color" content="#e9feff">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #e9feff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: sans-serif;
      text-align: center;
      animation: fadeIn 1s ease-in-out forwards;
    }
    img.logo {
      width: 300px;
      height: auto;
      margin-top: 2rem;
      transition: transform 0.3s ease-in-out;
    }
    h1 {
      font-size: 2rem;
      color: #0047AB;
      margin-top: 1rem;
    }
    p {
      font-size: 1rem;
      color: #444;
      margin: 1rem 2rem;
      max-width: 400px;
    }
    #jar-message {
      opacity: 0;
      transition: opacity 1.5s ease-in-out;
      font-style: italic;
      font-size: 0.95rem;
      color: #666;
    }
    footer {
      position: absolute;
      bottom: 20px;
      font-size: 0.75rem;
      color: #999;
      text-align: center;
      line-height: 1.4;
    }
    .privacy {
      font-size: 0.65rem;
      font-style: italic;
      color: #ccc;
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        document.getElementById('jar-message').style.opacity = '1';
      }, 10000); // Show after 10 seconds

      setTimeout(() => {
        window.location.href = '/';
      }, 15000); // Redirect after 15 seconds
    });
  </script>
</head>
<body>
  <img src="404_olive_stem.webp" alt="404 - Cobalt Olive" class="logo" width="300" height="300">

  <p>Olive not found.</p>
  <p id="jar-message">Opening a new jar…</p>

  <footer>
    &copy; 2025 Cobalt Olive. All rights reserved.<br>
    <span class="privacy">
      This site collects limited anonymous data for performance and traffic insights.
      <a href="/privacy.html" style="color: #ccc;">Privacy policy</a>.
      <a href="/contact.html" style="color: #ccc;">Contact</a>.
    </span>
  </footer>
</body>
</html>
