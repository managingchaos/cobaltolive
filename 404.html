<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 – Page Not Found</title>
  <meta name="description" content="Sorry, this page doesn't exist.">
  <meta name="theme-color" content="#d9d9d9">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="https://use.typekit.net/odl3tlj.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #d9d9d9;
      font-family: "acumin-pro-extra-condensed", sans-serif;
      color: #163359;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
    }

    .top-bar img {
      height: 50px;
    }

    nav {
      display: flex;
      gap: 1.5rem;
    }

    nav a {
      text-decoration: none;
      color: #586f8c;
      font-size: 1.5rem;
      font-weight: 300;
    }

    main {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 4rem 2rem;
    }

    img.logo {
      width: 300px;
      max-width: 100%;
      height: auto;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 4rem;
      color: #586f8c;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1.5rem;
      font-weight: 300;
      opacity: 1;
      transition: opacity 1s ease-in-out;
    }

    .delayed {
      opacity: 0;
    }

    footer {
      text-align: center;
      font-size: 1rem;
      color: #999;
      margin: 4rem 0 1rem;
    }

    .privacy {
      font-size: 1rem;
      font-style: italic;
      color: #999;
    }

    .privacy a {
      color: #999;
    }
  </style>
  <script>
    // Reveal “Opening a new jar…” text
    window.addEventListener("DOMContentLoaded", () => {
      setTimeout(() => {
        const delayed = document.querySelector('.delayed');
        if (delayed) delayed.style.opacity = 1;
      }, 10000);

      // Redirect after 15 seconds
      setTimeout(() => {
        window.location.href = "/";
      }, 15000);
    });
  </script>
</head>
<body>

  <!-- Nav -->
  <div class="top-bar">
    <a href="/"><img src="cobalt_olive_full_logo.webp" alt="Cobalt Olive logo" loading="lazy"></a>
    <nav>
      <a href="/about.html">About</a>
      <a href="/services.html">Services</a>
      <a href="/contact.html">Contact</a>
      <a href="/privacy.html">Privacy</a>
    </nav>
  </div>

  <!-- Main Message -->
  <main>
    <img src="404_olive_stem.webp" alt="Olive not found" class="logo" loading="lazy">
    <h1>Olive not found.</h1>
    <p class="delayed">Opening a new jar…</p>
  </main>

  <!-- Footer -->
  <footer>
    &copy; 2025 Cobalt Olive. All rights reserved.<br>
    <span class="privacy">
      This site collects limited anonymous data for performance and traffic insights.
      <a href="/privacy.html">Privacy policy</a>.
      <a href="/contact.html">Contact</a>.
    </span>
  </footer>

</body>
</html>
